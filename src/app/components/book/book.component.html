<form #bookForm="ngForm" (ngSubmit)="onSubmit(bookForm)">
  <div class="card p-4">
    <h1 class="mb-3">Add book</h1>
    <label for="name">Name</label>
    <input name="name" [(ngModel)]="book.name" required class="form-control" />
    <label for="author">Author</label>
    <input name="author" [(ngModel)]="book.author" class="form-control" required />
    <label for="genre">Genre</label>
    <select name="genre" [(ngModel)]="book.genre" class="form-select">
      <option value="">Select a genre</option>
    </select>
    <label for="price">Price</label>
    <input [(ngModel)]="book.price" name="price" type="number" required class="form-control" />
    <button [disabled]="bookForm.invalid" class="btn btn-primary w-100">Add Book</button>
  </div>
</form>
